{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Add Article{% endblock %}

{% block body %}
<div class="container mt-4" style="max-width: 600px;">
    <h2>Add a New Article</h2>
    <form method="post">
        {% csrf_token %}
        {{ form|crispy }}
        <button type="submit" class="btn btn-primary mt-2">Submit</button>
    </form>
</div>
{% endblock %}
